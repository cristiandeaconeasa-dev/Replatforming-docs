site_name: "Pricer Documentation"
site_description: "Pricer AB platform documentation — architecture, services, APIs, and onboarding"
repo_url: https://github.com/cristiandeaconeasa-dev/Replatforming-docs
edit_uri: ""

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+'
      lang:
        - en

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Replatforming:
      - Program Overview: 00-replatforming-program-overview.md
      - Systems Architecture: 01-systems-architecture.md
      - Tenant Model: 02-tenant-model.md
      - Replatforming Deep Dive: 03-replatforming-deep-dive.md
